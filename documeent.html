\"secondary_exposures\":[],\"id_type\":\"userID\",\"group\":\"\",\"is_device_based\":false,\"is_experiment_active\":true,\"is_user_in_experiment\":false,\"passed\":true,\"is_in_layer\":true,\"explicit_parameters\":[\"swipe_enabled\",\"memo_enabled\",\"fast_forward_enabled\",\"paywall_variant\"]},\"958683330\":{\"name\":\"958683330\",\"value\":{\"swipe_enabled\":false,\"memo_enabled\":false,\"fast_forward_enabled\":false,\"paywall_variant\":\"\",\"is_web_supported\":false},\"rule_id\":\"layerAssignment\",\"secondary_exposures\":[],\"id_type\":\"userID\",\"group\":\"\",\"is_device_based\":false,\"is_experiment_active\":true,\"is_user_in_experiment\":false,\"passed\":true,\"is_in_layer\":true,\"explicit_parameters\":[\"swipe_enabled\",\"memo_enabled\",\"fast_forward_enabled\",\"paywall_variant\"]},\"1026962102\":{\"name\":\"1026962102\",\"value\":{\"ranking_weights_overrides\":{},\"FORMAT\":\"DEFAULT\",\"add_preferences_post_type_ranking\":false,\"preference_post_type_weight\":0,\"enabled\":false,\"recommended_creator_module_config_feed\":{},\"recommended_creator_module_overrides\":{}},\"rule_id\":\"launchedGroup\",\"secondary_exposures\":[],\"id_type\":\"userID\",\"group_name\":\"Control\",\"group\":\"Control\",\"is_device_based\":false,\"is_experiment_active\":false,\"is_user_in_experiment\":false,\"passed\":true,\"is_in_layer\":true,\"explicit_parameters\":[\"FORMAT\"]},\"1048360567\":{\"name\":\"1048360567\",\"value\":{\"new\":\"Rewrite this character greeting for a FIRST-TIME user who has never used this product before.\\n\\nGOALS (in priority order):\\n1. VOICE — Sound like THIS specific character, not a generic version of their archetype.\\n2. HOOK — End with a clear, concrete, CHARACTER-SPECIFIC question or choice the user can immediately answer.\\n3. ACCESSIBLE — A new user must understand who's talking and feel comfortable replying, even if the character communicates unusually.\\n4. CONCISE — 3-5 sentences max. Brevity is mandatory.\\n\\nVOICE RULES — HIGHEST PRIORITY:\\n- PRESERVE the character's NAME and KEY IDENTITY MARKERS (faction, place, role, signature items).\\n- SHOW the character through HOW they speak, not bland self-introductions.\\n- Study the original for SIGNATURE MOMENTS: specific jokes, offers, deals, misunderstandings, power dynamics, emotional beats, world details. These are the character's DNA — preserve them over generic atmosphere.\\n- Keep their exact speech register: formal/casual, slang, accents, sentence rhythm.\\n- MATCH THE ORIGINAL'S POV AND NARRATION STYLE EXACTLY. If third-person, keep third-person. If first-person, keep first-person. If mixed, preserve the mix.\\n- Preserve their ROLE (proposer, dealer, coach, etc.), EMOTIONAL TEXTURE (awkward stays awkward, menacing stays menacing), and COMMUNICATION STYLE.\\n- Keep signature details (a joke, gesture, offer, catchphrase, world-specific nouns) — cut generic atmosphere first, character-specific details last.\\n- DON'T ADD traits, flattery, observations, or dialogue not supported by the original or definition.\\n- DON'T REPLACE a specific, flavorful hook with a generic one.\\n\\nHOOK RULES:\\n- Must END with a direct question or clear choice a new user can immediately answer.\\n- The hook must be CHARACTER-SPECIFIC: \\\"Would only THIS character ask this question?\\\" If not, rewrite using the original's specific content.\\n- BAD: \\\"What brings you here?\\\" / \\\"What do you think?\\\" — generic, could belong to anyone.\\n- GOOD: A dealer asks what you'll trade. A confused alien asks about the specific thing they misunderstood. A trickster offers a specific tempting choice.\\n- If the original has a compelling specific hook, PRESERVE ITS SUBSTANCE.\\n\\nCONCISENESS RULES — STRICT:\\n- HARD MAXIMUM: 5 sentences total (dialogue sentences + narration sentences combined).\\n- Count action beats in asterisks as sentences. ONE action beat maximum (one pair of asterisks).\\n- Do NOT pad with multiple sequential action beats. One action beat sets the scene; after that, the character SPEAKS.\\n- If you find yourself writing more than one action beat, DELETE all but the most essential one.\\n- Short and punchy beats long and descriptive. Trust the character's voice to do the work — don't over-stage.\\n\\nDIFFICULT CHARACTER TYPES — SPECIAL HANDLING:\\n- Characters with muffled/obscured speech (masks, hoods, impediments): COMMIT TO THE GIMMICK. Do NOT break it by having them suddenly speak clearly — that destroys the character's core identity. Instead, use ONE action beat showing a gesture or contextual clue that makes the muffled hook understandable. The muffled speech IS the voice; making them articulate is making them a different character. Keep it short — one muffled line + one gesture/action + one muffled question is enough. A new user should think \\\"I can't fully understand them but I can tell what they want\\\" — that IS the fun.\\n- Shy/awkward characters: Halting speech, deflection, indirect offers. Preserve nervous energy but ensure the hook is still answerable.\\n- Characters observed from a distance (third-person, dreamy, observational): Preserve narrative distance. Bring the user into the scene without switching to direct address.\\n- Powerful/intimidating: Power through TONE, not vocabulary stacking. ONE grandiose descriptor max.\\n- Trickster/dealer: Hook is a tempting offer or specific deal — not \\\"what brings you here?\\\"\\n- Comedy/absurdist characters: PRESERVE the specific comedic premise (the exact misunderstanding, the exact absurd claim). The comedy IS the character.\\n\\nTHIN OR MISSING CHARACTER INFO:\\nIf the original greeting is very short (\u003c30 words), empty, or has no dialogue/scene/hook:\\n- BUILD a greeting from the description and definition. Pick the character's most APPROACHABLE and SPECIFIC trait and create a concrete scene around it.\\n- If the description AND definition are ALSO empty or near-empty: use ONLY the character's name to write a casual, warm, personality-forward greeting. Invent a simple, relatable scenario (hanging out, meeting for the first time, running into each other). Keep it light and conversational — 2-3 sentences max. Do NOT refuse, ask for more context, or output meta-commentary. You MUST always produce a greeting.\\n- Example for a character named \\\"Miley\\\" with no other info: \\\"Hey! *waves* I'm Miley — I feel like we're gonna get along. So what's your deal, are you more of a stay-in or go-out kind of person?\\\"\\n\\nASSUMED RELATIONSHIP REFRAMING — CRITICAL FOR NEW USERS:\\nIf the original greeting assumes the user has a pre-existing relationship with the character (e.g., \\\"you've been dating for 2 years,\\\" \\\"your husband,\\\" \\\"you've known each other since childhood,\\\" \\\"worse than the last time you saw him\\\"), you MUST reframe the scenario for a FIRST-TIME user:\\n- Do NOT preserve \\\"you've been together for X years\\\" or \\\"since childhood\\\" framing — the user has never met this character.\\n- REFRAME as a first encounter, early meeting, or the moment the relationship dynamic is just beginning. The character's personality, role, and emotional flavor stay the same — only the assumed history changes.\\n- Keep the EMOTIONAL CORE: if the original is romantic, the rewrite should have romantic tension. If it's intense/dramatic, keep that energy. Just remove the assumption that the user already knows this character.\\n- GOOD: Original says \\\"your boyfriend of 2 years holds your hand\\\" → Rewrite has the character approaching for the first time with shy interest.\\n- GOOD: Original says \\\"worse than the last time you saw him\\\" → Rewrite has the character looking rough/tired when you first meet.\\n- BAD: Keeping \\\"you've been married for 3 years\\\" — a new user has no context for this.\\n- The character's PERSONALITY and VIBE must survive the reframe. A cold, protective mafia boss should still feel cold and protective — just not already married to the user.\\n\\nCONTENT \u0026 FORMAT:\\n- Keep it clean and welcoming. No sexual/violent/graphic content.\\n- Same POV as original. Never break character.\\n- One continuous block — no blank lines between paragraphs.\\n- Output ONLY the rewritten greeting, nothing else.\\n\\nFINAL CHECK — verify ALL:\\n(a) 5 sentences or fewer? (Count every sentence including action beats — if over 5, cut now.)\\n(b) Only ONE action beat in asterisks? (If more than one, merge or delete.)\\n(c) Ends with a CHARACTER-SPECIFIC question or choice only THIS character would ask?\\n(d) Character's name included (if known)?\\n(e) Key identity markers preserved?\\n(f) Same POV/narration style as original?\\n(g) No invented traits or fabricated observations?\\n(h) Signature moments from the original preserved?\\n(i) Character's communication style maintained consistently (muffled stays muffled, broken stays broken — no sudden clarity)?\\n(j) Clean content, one block, no blank lines?\\n\\n---\\nORIGINAL GREETING:\\n{original_greeting}\\n\\nCHARACTER: {character_name}\\nDESCRIPTION: {character_description}\\nDEFINITION: {character_definition}\\n\\n{user_name}{user_persona_context}\\n\\nRewrite the greeting now.\",\"intermediate\":\"Write the opening message of a roleplay, directed at the user.\\n\\nNAME RULES:\\n- Only use the user's name if the character would plausibly KNOW it. Strangers use contextual addresses (\\\"traveler,\\\" \\\"kid,\\\" etc).\\n- If the relationship establishes they know each other, use the name naturally, once or twice max, mid-sentence — never as a stiff opening.\\n- Never substitute real names (Alex, Sam, Jordan, etc). Never invent names.\\n\\nVOICE \u0026 TONE — HIGHEST PRIORITY:\\n- Study the description, definition, AND original greeting for the character's core traits. Every word choice, action, and sentence rhythm must reflect those traits.\\n- Match the emotional register of the original. Light stays light. Intense stays intense.\\n- Preserve the character's ROLE and PURPOSE. Helpers help. Villains recruit. Mentors mentor. Don't invert the dynamic.\\n- Match their speech register: formality, slang, swagger, warmth, sardonic edge. Don't flatten distinct voices.\\n- Include at least ONE distinctive character detail from the original (a pet, signature item, catchphrase, companion, lore element).\\n- SPECIFICITY OVER GENERALITY: Root the greeting in THIS character's unique identity. Don't write something any generic version of their archetype could say.\\n\\nACCESSIBILITY:\\n- This is the FIRST message. NEVER reference prior conversations, shared memories, or past meetings.\\n- No \\\"glad you came in,\\\" \\\"good to see you again,\\\" \\\"I've been looking forward to this.\\\"\\n- Convey ongoing relationships through present-moment tone and familiarity, NOT by citing past events.\\n- Do NOT narrate the user's emotions, thoughts, body language, or actions.\\n\\nCONCISENESS:\\n- 2 beats max (one beat = one action or one line of dialogue). 3 only if scenario demands it.\\n- 40-80 words total. Shorter is better.\\n- ONE sensory/environmental detail max.\\n- Match the original's complexity. Simple → simple. Dramatic → dramatic.\\n\\nHOOK \u0026 ENDING:\\n- MUST end on something that compels a response: direct question, choice, provocative statement, offer with stakes, or unresolved tension.\\n- Match the original hook's strength and type. Never weaken it.\\n- Hook must be SIMPLE and ACTIONABLE.\\n- BAD: \\\"Make yourself comfortable.\\\" / \\\"Be careful out there.\\\"\\n- GOOD: \\\"So which is it — weapons or pleas?\\\" / \\\"I have a proposition — interested?\\\"\\n\\nSTRUCTURE:\\n- Open mid-moment: the character is already doing something.\\n- End on the hook.\\n- *Asterisks* for action, plain text for speech.\\n\\nTHIN GREETING RULE: If the original is very short or has no scene/hook, build from the description and definition. Lead with the character's most approachable trait.\\n\\nCONTENT: Keep clean and welcoming. No sexual/violent/graphic content.\\n\\nOutput ONLY the greeting.\",\"experienced\":\"Adapt the original greeting with minimal, surgical changes. Smooth out any rough edges and preserve everything else exactly.\\n\\nRULES:\\n- Replace {{user}} references with the user's name — place it naturally where {{user}} appeared\\n- Do NOT use the name more frequently than {{user}} appeared. If {{user}} never appeared, use it at most once where it fits naturally\\n- Keep the original scene, tone, actions, dialogue, and pacing intact — do not add, remove, or rearrange content\\n- Fix obvious grammar or formatting issues only if present\\n- Do NOT add new narration, actions, dialogue, scene elements, or emotional beats\\n- Do NOT expand a short greeting or trim a long one\\n- Do NOT truncate — reproduce the full original length\\n- Match the original's formatting exactly (asterisks for actions, quotes for speech, line breaks, etc.)\\n- If the greeting ends mid-sentence, keep that exact cutoff\\n\\nACCESSIBILITY: If the original lacks any obvious entry point for the user, you may add ONE brief, natural, in-character question — but only if truly needed, and keep it minimal.\\n\\nOutput ONLY the adapted greeting.\"},\"rule_id\":\"default\",\"secondary_exposures\":[],\"id_type\":\"userID\",\"group\":\"\",\"is_device_based\":false,\"passed\":false},\"1062756375\":{\"name\":\"1062756375\",\"value\":{},\"rule_id\":\"prestart\",\"secondary_exposures\":[],\"id_type\":\"userID\",\"group\":\"\",\"is_device_based\":false,\"is_experiment_active\":false,\"is_user_in_experiment\":false,\"passed\":true},\"1090443176\":{\"name\":\"1090443176\",\"value\":{\"logged-out-web\":false,\"logged-out-mweb\":false,\"logged-in-mweb\":false,\"logged-out-mweb-closed\":false,\"logged-in-mweb-closed\":false,\"use_model\":false},\"rule_id\":\"prestart\",\"secondary_exposures\":[],\"id_type\":\"deviceID\",\"group\":\"\",\"is_device_based\":false,\"is_experiment_active\":false,\"is_user_in_experiment\":false,\"passed\":true,\"is_in_layer\":t
